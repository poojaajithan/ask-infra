spring.application.name=ask-infra-backend
server.port=8080

# ─── H2 In-Memory Database ────────────────────────────────────────────────────
# jdbc:h2:mem: means the DB lives only in RAM — wiped on restart.
# That's fine for a demo; DataSeeder re-populates it every boot.
spring.datasource.url=jdbc:h2:mem:askinfradb
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
# Dialect auto-detected by Hibernate — no need to set explicitly for H2

# create-drop: Hibernate creates tables on start, drops them on shutdown.
# Matches the in-memory approach — schema matches our @Entity classes exactly.
spring.jpa.hibernate.ddl-auto=create-drop

# H2 web console — browse to http://localhost:8080/h2-console after startup
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

spring.ai.google.genai.api-key=${GEMINI_API_KEY}
spring.ai.google.genai.chat.options.model=gemini-2.5-flash
spring.ai.google.genai.embedding.options.model=gemini-embedding-001
